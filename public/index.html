<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Face Group — Lưu nhóm Facebook công khai</title>
    <meta name="description" content="Công cụ lưu trữ link nhóm Facebook cho phép đăng bài công khai, không cần duyệt.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===== LOGIN SCREEN ===== -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h1>📋 Save Face Group</h1>
            <p class="subtitle">Đăng nhập để quản lý nhóm Facebook</p>
            <div class="login-error" id="loginError"></div>
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="text" id="loginEmail" placeholder="admin@example.com" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="loginPassword">Mật khẩu</label>
                <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn-login" id="btnLogin" onclick="handleLogin()">Đăng nhập</button>
        </div>
    </div>

    <!-- ===== MAIN APP ===== -->
    <div id="appScreen" class="app hidden">

        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1>📋 Save Face Group</h1>
                <p>Lưu nhóm Facebook không duyệt — đăng công khai</p>
            </div>
            <div class="header-right">
                <span class="user-email" id="userEmail"></span>
                <button class="btn-logout" onclick="handleLogout()">Đăng xuất</button>
            </div>
        </header>

        <!-- Add Group -->
        <section class="add-section">
            <div class="input-row">
                <input type="url" id="urlInput"
                    placeholder="Paste link group Facebook... (VD: https://facebook.com/groups/abc)">
                <button class="btn-add" id="btnAdd" onclick="addGroup()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    <span id="btnAddText">Thêm</span>
                </button>
            </div>
        </section>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="stats">Đã lưu <span id="groupCount">0</span> nhóm</div>
            <div class="search-wrap">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Tìm nhóm...">
            </div>
        </div>

        <!-- Group List -->
        <div class="group-list" id="groupList"></div>

        <!-- Footer Actions -->
        <div class="footer-actions">
            <button class="btn-secondary" onclick="copyAllLinks()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
                Copy tất cả link
            </button>
            <button class="btn-secondary" onclick="exportGroups()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Xuất backup
            </button>
            <button class="btn-secondary" onclick="importGroups()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                Nhập backup
            </button>
        </div>

    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
